<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANNALS — Historical Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nanum+Myeongjo:wght@400;700&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #12100e;
      --parchment: #f2ead8;
      --aged: #e8dcc4;
      --gold: #b8922a;
      --rust: #8b3a2a;
      --warm-white: #faf6ee;
      --overlay: rgba(18,16,14,0.85);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--warm-white); color: var(--ink); font-family: 'Nanum Myeongjo', serif; line-height: 1.8; word-break: keep-all; }

    /* NAVIGATION */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 25px 40px; background: rgba(250,246,238,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(184,146,42,0.15); }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 900; letter-spacing: 6px; color: var(--ink); text-decoration: none; }
    .nav-logo span { color: var(--gold); }
    .btn-write { background: var(--rust); color: white; border: none; padding: 10px 20px; border-radius: 2px; cursor: pointer; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; }

    /* HEADER */
    .header-section { padding: 160px 20px 60px; text-align: center; background: var(--parchment); border-bottom: 1px solid var(--aged); }
    .main-title { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 7vw, 4.5rem); font-weight: 900; letter-spacing: 10px; margin-bottom: 15px; }
    .sub-title { font-family: 'IM Fell English', serif; font-style: italic; font-size: 20px; color: var(--muted); max-width: 700px; margin: 0 auto; }

    /* FILTER BAR: 아프리카, 중동 추가 */
    .filter-bar { padding: 25px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; border-bottom: 1px solid var(--aged); }
    .tag-btn { background: none; border: none; color: var(--muted); font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1.5px; cursor: pointer; padding: 5px 10px; }
    .tag-btn.active { color: var(--gold); border-bottom: 1px solid var(--gold); font-weight: 700; }

    /* LIST & CARDS */
    .article-container { max-width: 850px; margin: 0 auto; padding: 50px 20px; }
    .archive-card { margin-bottom: 80px; border-bottom: 1px solid var(--aged); padding-bottom: 40px; }
    .card-meta { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); letter-spacing: 3px; margin-bottom: 15px; }
    .card-title { font-size: 30px; font-weight: 700; margin-bottom: 20px; }
    .content-text { font-size: 17px; line-height: 2.1; text-align: justify; white-space: pre-wrap; }
    
    .photo-frame { margin: 30px auto; padding: 12px 12px 40px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--aged); max-width: 450px; }
    .photo-frame img { width: 100%; display: block; filter: sepia(0.15); }

    .card-actions { margin-top: 25px; display: flex; gap: 15px; }
    .btn-sm { background: none; border: none; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px; cursor: pointer; color: var(--gold); }

    /* MODAL: 입력 칸 대폭 확대 */
    .modal-bg { display: none; position: fixed; inset: 0; background: var(--overlay); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
    .modal-bg.open { display: flex; }
    .modal { background: var(--parchment); width: 100%; max-width: 750px; padding: 40px; border-radius: 0; max-height: 90vh; overflow-y: auto; border: 1px solid var(--gold); }
    
    label { display: block; font-family: 'Cinzel', serif; font-size: 10px; color: var(--rust); margin-bottom: 5px; letter-spacing: 1px; }
    input, select, textarea { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid var(--aged); background: white; font-family: 'Nanum Myeongjo', serif; font-size: 16px; }
    
    /* 매우 긴 입력창 */
    textarea { min-height: 400px; line-height: 1.9; resize: vertical; }

    .modal-btns { display: flex; gap: 15px; }
    .modal-btns button { flex: 1; padding: 15px; border: none; cursor: pointer; font-family: 'Cinzel', serif; letter-spacing: 2px; }
    .save-btn { background: var(--ink); color: white; }
    .cancel-btn { background: var(--muted); color: white; }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">ANN<span>A</span>LS</a>
    <button class="btn-write" onclick="openModal()">＋ ARCHIVE NEW</button>
  </nav>

  <header class="header-section">
    <h1 class="main-title">ANNALS</h1>
    <p class="sub-title">역사 속 인물들의 삶과 권력의 흐름을 기록하는 아카이브</p>
  </header>

  <div class="filter-bar">
    <button class="tag-btn active" onclick="filterBy('전체', this)">ALL</button>
    <button class="tag-btn" onclick="filterBy('아시아', this)">ASIA</button>
    <button class="tag-btn" onclick="filterBy('유럽', this)">EUROPE</button>
    <button class="tag-btn" onclick="filterBy('미국', this)">USA</button>
    <button class="tag-btn" onclick="filterBy('아프리카', this)">AFRICA</button>
    <button class="tag-btn" onclick="filterBy('중동', this)">MIDDLE EAST</button>
  </div>

  <main class="article-container" id="archiveList"></main>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h2 style="font-family:'Cinzel', serif; text-align:center; margin-bottom:30px;">RECORDING</h2>
      <label>REGION</label>
      <select id="f-region">
        <option value="아시아">ASIA (아시아)</option>
        <option value="유럽">EUROPE (유럽)</option>
        <option value="미국">USA (미국)</option>
        <option value="아프리카">AFRICA (아프리카)</option>
        <option value="중동">MIDDLE EAST (중동)</option>
      </select>
      <label>TITLE</label><input type="text" id="f-title">
      <label>CHRONICLE</label><textarea id="f-content"></textarea>
      <label>IMAGE URL</label><input type="text" id="f-img">
      <div class="modal-btns">
        <button class="save-btn" onclick="handleSave()">COMMIT</button>
        <button class="cancel-btn" onclick="closeModal()">CANCEL</button>
      </div>
    </div>
  </div>

  <script>
    let archives = JSON.parse(localStorage.getItem('annals_final_v1') || '[]');
    let editId = null;

    if(archives.length === 0) {
      archives = [{id: 1, region: '중동', title: '발푸어 선언', content: '1917년 영국 외무장관 밸푸어가 유대인 국가 건설을 지지한다고 밝힌 선언입니다. 이 기록은 훗날 중동의 복잡한 분쟁의 불씨가 되었습니다.', img: ''}];
      localStorage.setItem('annals_final_v1', JSON.stringify(archives));
    }

    function render(filter = '전체') {
      const list = document.getElementById('archiveList');
      list.innerHTML = '';
      const filtered = filter === '전체' ? archives : archives.filter(a => a.region === filter);
      filtered.forEach(a => {
        list.innerHTML += `
          <div class="archive-card">
            <p class="card-meta">${a.region} · ARCHIVE</p>
            <h2 class="card-title">${a.title}</h2>
            <div class="content-text">${a.content}</div>
            ${a.img ? `<div class="photo-frame"><img src="${a.img}" onerror="this.style.display='none'"></div>` : ''}
            <div class="card-actions">
              <button class="btn-sm" onclick="openModal(${a.id})">EDIT</button>
              <button class="btn-sm" style="color:var(--rust)" onclick="deleteArchive(${a.id})">DELETE</button>
            </div>
          </div>`;
      });
    }

    function openModal(id = null) {
      editId = id;
      if(id) {
        const a = archives.find(i => i.id === id);
        document.getElementById('f-region').value = a.region;
        document.getElementById('f-title').value = a.title;
        document.getElementById('f-content').value = a.content;
        document.getElementById('f-img').value = a.img || '';
      } else {
        document.getElementById('f-title').value = '';
        document.getElementById('f-content').value = '';
        document.getElementById('f-img').value = '';
      }
      document.getElementById('modalBg').classList.add('open');
    }

    function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

    function handleSave() {
      const data = { id: editId || Date.now(), region: document.getElementById('f-region').value, title: document.getElementById('f-title').value, content: document.getElementById('f-content').value, img: document.getElementById('f-img').value };
      if(editId) { const idx = archives.findIndex(a => a.id === editId); archives[idx] = data; }
      else { archives.unshift(data); }
      localStorage.setItem('annals_final_v1', JSON.stringify(archives));
      render(); closeModal();
    }

    function deleteArchive(id) { if(confirm("삭제할까요?")) { archives = archives.filter(a => a.id !== id); localStorage.setItem('annals_final_v1', JSON.stringify(archives)); render(); } }

    function filterBy(region, btn) {
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); render(region);
    }
    render();
  </script>
</body>
</html>
