<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANNALS — Historical Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nanum+Myeongjo:wght@400;700&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a1a;        /* 블랙 */
      --paper: #fff5f7;      /* 옅은 핑크 배경 */
      --gold: #b8860b;       /* 골드 포인트 */
      --rose: #e6b3b3;       /* 경계선 핑크 */
      --warm-white: #ffffff; /* 카드 내부 백색 */
      --rust: #8b3a2a;       /* 경고/삭제 색상 */
      --overlay: rgba(0, 0, 0, 0.85);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--paper); color: var(--ink); font-family: 'Nanum Myeongjo', serif; line-height: 1.9; word-break: keep-all; }

    /* NAVIGATION */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px 40px; background: rgba(255, 245, 247, 0.95); backdrop-filter: blur(10px); border-bottom: 2px solid var(--rose); }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 900; letter-spacing: 7px; color: var(--ink); text-decoration: none; }
    .nav-logo span { color: var(--gold); }

    /* HEADER */
    .header-section { padding: 140px 20px 60px; text-align: center; background: linear-gradient(to bottom, var(--paper), #fff); }
    .main-title { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900; letter-spacing: 12px; margin-bottom: 15px; color: var(--ink); }

    /* FILTER BAR */
    .filter-bar { padding: 20px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; background: #fff; border-bottom: 1px solid var(--rose); }
    .tag-btn { background: none; border: none; color: #777; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; cursor: pointer; padding: 5px 12px; }
    .tag-btn.active { color: var(--gold); font-weight: 700; border-bottom: 2px solid var(--gold); }

    /* 메인 컨테이너 */
    .article-container { max-width: 850px; margin: 0 auto; padding: 40px 20px 100px; }

    /* 글쓰기 게시판 (화면에 항상 노출) */
    .write-board { background: var(--warm-white); border: 2px solid var(--gold); padding: 35px; margin-bottom: 60px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .write-board h2 { font-family: 'Cinzel', serif; font-size: 20px; color: var(--ink); margin-bottom: 25px; text-align: center; letter-spacing: 4px; }
    
    label { display: block; font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); margin-bottom: 8px; letter-spacing: 2px; font-weight: 700; }
    input, select, textarea { width: 100%; padding: 15px; margin-bottom: 25px; border: 1px solid var(--rose); background: #fff; font-family: 'Nanum Myeongjo', serif; font-size: 16px; outline: none; }
    textarea:focus, input:focus { border-color: var(--gold); }
    
    /* 화면용 글쓰기 칸 높이 (너무 길면 스크롤이 힘드니 적당히 길게) */
    .write-board textarea { min-height: 250px; line-height: 2; resize: vertical; }

    .btn-submit { background: var(--ink); color: #fff; border: 1px solid var(--gold); width: 100%; padding: 18px; font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 3px; cursor: pointer; transition: 0.3s; }
    .btn-submit:hover { background: var(--gold); color: var(--ink); font-weight: bold; }

    /* 기록된 카드들 */
    .archive-card { background: var(--warm-white); border: 1px solid var(--rose); padding: 40px; margin-bottom: 80px; box-shadow: 0 10px 30px rgba(230, 179, 179, 0.2); }
    
    /* 수정/삭제 버튼 상단 고정 */
    .card-top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--paper); padding-bottom: 15px; }
    .card-meta { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); letter-spacing: 3px; }
    .top-actions { display: flex; gap: 10px; }
    .btn-top { background: var(--ink); color: #fff; border: none; padding: 8px 16px; font-family: 'Cinzel', serif; font-size: 10px; cursor: pointer; letter-spacing: 1.5px; }
    .btn-top.del { background: var(--rust); }

    .card-title { font-size: 32px; font-weight: 700; margin-bottom: 25px; line-height: 1.3; }
    .content-text { font-size: 17.5px; line-height: 2.2; text-align: justify; white-space: pre-wrap; color: #333; }
    
    /* 사진 프레임 */
    .photo-frame { margin: 40px auto 0; padding: 12px 12px 40px; background: #fff; border: 1px solid var(--rose); max-width: 450px; text-align: center; }
    .photo-frame img { width: 100%; display: block; filter: sepia(0.1); }
    .photo-frame::after { content: 'Archived Photograph'; display: block; margin-top: 15px; font-family: 'IM Fell English', serif; font-style: italic; color: #999; font-size: 13px; }

    /* EDIT MODAL (수정할 때만 뜨는 창) */
    .modal-bg { display: none; position: fixed; inset: 0; background: var(--overlay); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
    .modal-bg.open { display: flex; }
    .modal { background: var(--paper); width: 100%; max-width: 800px; padding: 40px; border: 2px solid var(--gold); max-height: 90vh; overflow-y: auto; }
    .modal textarea { min-height: 400px; }
    .modal-btns { display: flex; gap: 15px; }
    .modal-btns button { flex: 1; padding: 18px; border: none; cursor: pointer; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 2px; }
    .cancel-btn { background: #777; color: white; }

    footer { background: var(--ink); color: var(--paper); padding: 80px 20px; text-align: center; font-family: 'Cinzel', serif; letter-spacing: 8px; border-top: 3px solid var(--gold); }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo" onclick="filterBy('전체', document.querySelector('.tag-btn'))">ANN<span>A</span>LS</a>
  </nav>

  <header class="header-section">
    <h1 class="main-title">ANNALS</h1>
    <p style="font-family:'IM Fell English', serif; font-style:italic; color:#777; font-size:18px;">인류의 발자취를 남기는 아카이브</p>
  </header>

  <div class="filter-bar">
    <button class="tag-btn active" onclick="filterBy('전체', this)">ALL</button>
    <button class="tag-btn" onclick="filterBy('아시아', this)">ASIA</button>
    <button class="tag-btn" onclick="filterBy('유럽', this)">EUROPE</button>
    <button class="tag-btn" onclick="filterBy('미국', this)">USA</button>
    <button class="tag-btn" onclick="filterBy('아프리카', this)">AFRICA</button>
    <button class="tag-btn" onclick="filterBy('중동', this)">MIDDLE EAST</button>
  </div>

  <main class="article-container">
    
    <div class="write-board">
      <h2>ADD NEW CHRONICLE</h2>
      <label>REGION</label>
      <select id="new-region">
        <option value="아시아">ASIA (아시아)</option>
        <option value="유럽">EUROPE (유럽)</option>
        <option value="미국">USA (미국)</option>
        <option value="아프리카">AFRICA (아프리카)</option>
        <option value="중동">MIDDLE EAST (중동)</option>
      </select>
      
      <label>TITLE</label>
      <input type="text" id="new-title" placeholder="인물 혹은 사건명을 입력하세요">
      
      <label>CHRONICLE</label>
      <textarea id="new-content" placeholder="이곳에 역사의 흐름을 기록하세요."></textarea>
      
      <label>IMAGE URL (사진 링크)</label>
      <input type="text" id="new-img" placeholder="JPG, PNG 등 이미지 주소">
      
      <button class="btn-submit" onclick="handleSaveNew()">ARCHIVE (기록하기)</button>
    </div>

    <div id="archiveList"></div>

  </main>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h2 style="font-family:'Cinzel', serif; text-align:center; margin-bottom:25px; color:var(--ink);">EDIT RECORD</h2>
      <label>REGION</label>
      <select id="edit-region">
        <option value="아시아">ASIA</option>
        <option value="유럽">EUROPE</option>
        <option value="미국">USA</option>
        <option value="아프리카">AFRICA</option>
        <option value="중동">MIDDLE EAST</option>
      </select>
      <label>TITLE</label><input type="text" id="edit-title">
      <label>CHRONICLE</label><textarea id="edit-content"></textarea>
      <label>IMAGE URL</label><input type="text" id="edit-img">
      <div class="modal-btns">
        <button class="btn-submit" onclick="handleSaveEdit()">UPDATE</button>
        <button class="cancel-btn" onclick="closeModal()">CANCEL</button>
      </div>
    </div>
  </div>

  <script>
    // 💡 과거에 작성하셨던 데이터 복구 로직 (이전에 쓰신 글이 있다면 살아납니다!)
    let pastData1 = JSON.parse(localStorage.getItem('annals_fixed_v1') || '[]');
    let pastData2 = JSON.parse(localStorage.getItem('annals_premium_final') || '[]');
    let pastData3 = JSON.parse(localStorage.getItem('annals_pink_v1') || '[]');
    let currentData = JSON.parse(localStorage.getItem('annals_data_master') || '[]');

    // 예전 데이터들을 영혼까지 끌어모아 합칩니다
    if(currentData.length === 0) {
        let combined = [...pastData1, ...pastData2, ...pastData3];
        // 중복 제거 및 아이디 정리
        let unique = combined.filter((v,i,a)=>a.findIndex(t=>(t.title === v.title))===i);
        if(unique.length > 0) {
            currentData = unique;
        } else {
            // 진짜 아무것도 없으면 예시 하나만 넣기
            currentData = [{id: 1, region: '중동', title: '벨푸어 선언 (1917)', content: '영국 외무장관 아서 밸푸어가 유대인 국가 건설 지지를 표명한 사건입니다.', img: ''}];
        }
        localStorage.setItem('annals_data_master', JSON.stringify(currentData));
    }
    
    let archives = currentData;
    let editTargetId = null;

    function render(filter = '전체') {
      const list = document.getElementById('archiveList');
      list.innerHTML = '';
      const filtered = filter === '전체' ? archives : archives.filter(a => a.region === filter);
      
      filtered.forEach(a => {
        list.innerHTML += `
          <div class="archive-card">
            <div class="card-top-header">
                <p class="card-meta">${a.region} · CHRONICLE</p>
                <div class="top-actions">
                    <button class="btn-top" onclick="openEditModal(${a.id})">EDIT (수정)</button>
                    <button class="btn-top del" onclick="deleteArchive(${a.id})">ERASE (삭제)</button>
                </div>
            </div>
            <h2 class="card-title">${a.title}</h2>
            <div class="content-text">${a.content}</div>
            ${a.img ? `<div class="photo-frame"><img src="${a.img}" onerror="this.style.display='none'"></div>` : ''}
          </div>`;
      });
    }

    // 새 글 작성 (메인 화면)
    function handleSaveNew() {
      const title = document.getElementById('new-title').value;
      const content = document.getElementById('new-content').value;
      
      if(!title || !content) return alert("제목과 내용을 모두 적어주세요!");

      const data = { 
        id: Date.now(), 
        region: document.getElementById('new-region').value, 
        title: title, 
        content: content, 
        img: document.getElementById('new-img').value 
      };
      
      archives.unshift(data);
      localStorage.setItem('annals_data_master', JSON.stringify(archives));
      
      // 작성 후 칸 비우기
      document.getElementById('new-title').value = '';
      document.getElementById('new-content').value = '';
      document.getElementById('new-img').value = '';
      
      render();
    }

    // 수정 모달 열기
    function openEditModal(id) {
      editTargetId = id;
      const a = archives.find(i => i.id === id);
      document.getElementById('edit-region').value = a.region;
      document.getElementById('edit-title').value = a.title;
      document.getElementById('edit-content').value = a.content;
      document.getElementById('edit-img').value = a.img || '';
      document.getElementById('modalBg').classList.add('open');
    }

    function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

    // 수정된 글 저장
    function handleSaveEdit() {
      const data = { 
        id: editTargetId, 
        region: document.getElementById('edit-region').value, 
        title: document.getElementById('edit-title').value, 
        content: document.getElementById('edit-content').value, 
        img: document.getElementById('edit-img').value 
      };
      
      const idx = archives.findIndex(a => a.id === editTargetId);
      archives[idx] = data;
      
      localStorage.setItem('annals_data_master', JSON.stringify(archives));
      render(); closeModal();
    }

    // 삭제 기능
    function deleteArchive(id) { 
      if(confirm("이 기록을 영구히 삭제할까요?")) { 
        archives = archives.filter(a => a.id !== id); 
        localStorage.setItem('annals_data_master', JSON.stringify(archives)); 
        render(); 
      } 
    }

    function filterBy(region, btn) {
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); render(region);
    }
    
    render();
  </script>
</body>
</html>
