<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANNALS — Historical Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nanum+Myeongjo:wght@400;700&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a1a;        /* 블랙 */
      --paper: #fff5f7;      /* 옅은 핑크 배경 */
      --gold: #b8860b;       /* 골드 포인트 */
      --rose: #e6b3b3;       /* 경계선 핑크 */
      --warm-white: #ffffff; /* 카드 내부 백색 */
      --rust: #8b3a2a;
      --overlay: rgba(0, 0, 0, 0.85);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--paper); color: var(--ink); font-family: 'Nanum Myeongjo', serif; line-height: 1.9; word-break: keep-all; }

    /* NAVIGATION */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 25px 40px; background: rgba(255, 245, 247, 0.95); backdrop-filter: blur(10px); border-bottom: 2px solid var(--rose); }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 900; letter-spacing: 7px; color: var(--ink); text-decoration: none; }
    .nav-logo span { color: var(--gold); }
    .btn-write { background: var(--ink); color: #fff; border: 1px solid var(--gold); padding: 12px 22px; border-radius: 0; cursor: pointer; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; transition: 0.3s; }
    .btn-write:hover { background: var(--gold); border-color: var(--ink); color: var(--ink); font-weight: bold; }

    /* HEADER */
    .header-section { padding: 180px 20px 80px; text-align: center; background: linear-gradient(to bottom, var(--paper), #fff); }
    .main-title { font-family: 'Cinzel', serif; font-size: clamp(2.8rem, 8vw, 5rem); font-weight: 900; letter-spacing: 12px; margin-bottom: 20px; color: var(--ink); }

    /* FILTER BAR */
    .filter-bar { padding: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; background: #fff; border-bottom: 1px solid var(--rose); }
    .tag-btn { background: none; border: none; color: #777; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; cursor: pointer; padding: 5px 12px; }
    .tag-btn.active { color: var(--gold); font-weight: 700; border-bottom: 2px solid var(--gold); }

    /* LIST & CARDS */
    .article-container { max-width: 850px; margin: 0 auto; padding: 60px 20px 100px; }
    .archive-card { background: var(--warm-white); border: 1px solid var(--rose); padding: 40px; margin-bottom: 80px; box-shadow: 0 10px 30px rgba(230, 179, 179, 0.2); position: relative; }
    
    /* 버튼 상단 고정 */
    .card-top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--paper); padding-bottom: 15px; }
    .card-meta { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); letter-spacing: 3px; }
    .top-actions { display: flex; gap: 12px; }
    .btn-top { background: var(--ink); color: #fff; border: none; padding: 6px 14px; font-family: 'Cinzel', serif; font-size: 10px; cursor: pointer; letter-spacing: 1px; transition: 0.2s; }
    .btn-top:hover { opacity: 0.8; }
    .btn-top.del { background: var(--rust); }

    .card-title { font-size: 32px; font-weight: 700; margin-bottom: 25px; line-height: 1.2; }
    .content-text { font-size: 17.5px; line-height: 2.2; text-align: justify; white-space: pre-wrap; color: #333; }
    
    .photo-frame { margin: 40px auto 0; padding: 12px 12px 40px; background: #fff; border: 1px solid var(--rose); box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 450px; text-align: center; }
    .photo-frame img { width: 100%; display: block; filter: sepia(0.1); }
    .photo-frame::after { content: 'Archived Chronicle Image'; display: block; margin-top: 15px; font-family: 'IM Fell English', serif; font-style: italic; color: #999; font-size: 13px; }

    /* MODAL (핑크 & 골드) */
    .modal-bg { display: none; position: fixed; inset: 0; background: var(--overlay); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
    .modal-bg.open { display: flex; }
    .modal { background: var(--paper); width: 100%; max-width: 800px; padding: 50px; border: 2px solid var(--gold); max-height: 90vh; overflow-y: auto; }
    
    label { display: block; font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); margin-bottom: 8px; letter-spacing: 2px; font-weight: 700; }
    input, select, textarea { width: 100%; padding: 15px; margin-bottom: 25px; border: 1px solid var(--rose); background: #fff; font-family: 'Nanum Myeongjo', serif; font-size: 16px; outline: none; }
    textarea:focus, input:focus { border-color: var(--gold); }
    
    textarea { min-height: 450px; line-height: 2; resize: vertical; }

    .modal-btns { display: flex; gap: 15px; }
    .modal-btns button { flex: 1; padding: 18px; border: none; cursor: pointer; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 2px; transition: 0.3s; }
    .save-btn { background: var(--ink); color: white; border: 1px solid var(--gold); }
    .save-btn:hover { background: var(--gold); color: var(--ink); font-weight: bold; }
    .cancel-btn { background: #777; color: white; }

    footer { background: var(--ink); color: var(--paper); padding: 80px 20px; text-align: center; font-family: 'Cinzel', serif; letter-spacing: 8px; border-top: 3px solid var(--gold); }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo" onclick="filterBy('전체', document.querySelector('.tag-btn'))">ANN<span>A</span>LS</a>
    <button class="btn-write" onclick="openModal()">＋ ARCHIVE NEW</button>
  </nav>

  <header class="header-section">
    <p class="card-meta" style="margin-bottom: 20px;">The Noble Chronicles</p>
    <h1 class="main-title">ANNALS</h1>
    <p style="font-family:'IM Fell English', serif; font-style:italic; color:#777; font-size:20px;">기록되지 않은 역사는 사라진다.</p>
  </header>

  <div class="filter-bar">
    <button class="tag-btn active" onclick="filterBy('전체', this)">ALL</button>
    <button class="tag-btn" onclick="filterBy('아시아', this)">ASIA</button>
    <button class="tag-btn" onclick="filterBy('유럽', this)">EUROPE</button>
    <button class="tag-btn" onclick="filterBy('미국', this)">USA</button>
    <button class="tag-btn" onclick="filterBy('아프리카', this)">AFRICA</button>
    <button class="tag-btn" onclick="filterBy('중동', this)">MIDDLE EAST</button>
  </div>

  <main class="article-container" id="archiveList"></main>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h2 style="font-family:'Cinzel', serif; text-align:center; margin-bottom:30px; letter-spacing:4px;">COMMITTING TO ARCHIVE</h2>
      <label>REGION</label>
      <select id="f-region">
        <option value="아시아">ASIA (아시아)</option>
        <option value="유럽">EUROPE (유럽)</option>
        <option value="미국">USA (미국)</option>
        <option value="아프리카">AFRICA (아프리카)</option>
        <option value="중동">MIDDLE EAST (중동)</option>
      </select>
      <label>TITLE</label><input type="text" id="f-title" placeholder="인물 혹은 사건">
      <label>CHRONICLE</label><textarea id="f-content" placeholder="이곳에 역사의 흐름을 기록하세요."></textarea>
      <label>IMAGE URL</label><input type="text" id="f-img" placeholder="사진 링크 (JPG, PNG 등)">
      <div class="modal-btns">
        <button class="save-btn" onclick="handleSave()">ARCHIVE</button>
        <button class="cancel-btn" onclick="closeModal()">CANCEL</button>
      </div>
    </div>
  </div>

  <script>
    // V2로 키를 변경하여 예전 빈 데이터 캐시를 무시합니다.
    let archives = JSON.parse(localStorage.getItem('annals_pink_v2') || '[]');
    let editId = null;

    if(archives.length === 0) {
      archives = [
        {
          id: 1, region: '유럽', title: '조지 6세', 
          content: '왕이 될 운명이 아니었던 남자, 말더듬이를 극복한 인간적인 군주.\n\n그는 화려한 스포트라이트를 받는 것을 두려워하는 내성적인 차남이었습니다. 본래 왕이 될 운명이 아니었기에 가족들은 그가 조용한 삶을 살 수 있을 것이라 믿었습니다. 그러나 형인 에드워드 8세가 사랑을 위해 왕위를 포기하는 사상 초유의 사건이 벌어지며 동생이었던 그가 갑작스럽게 왕위에 오르게 됩니다.', 
          img: ''
        },
        {
          id: 2, region: '유럽', title: '제1차 세계대전', 
          content: '사라예보의 총성, 제국들의 붕괴와 참호 속에서 스러진 구시대의 환상 (1914-1918)\n\n1914년 6월 28일, 발칸 반도의 사라예보에서 울려 퍼진 두 발의 총성은 복잡하게 얽혀 있던 유럽의 동맹 체제를 단숨에 연쇄 폭발로 이끌었습니다. 오스트리아-헝가리 제국의 황태자 부부 암살 사건은, 수십 년간 제국주의 열강들이 조용히 쌓아오던 화약고에 불을 붙인 치명적인 성냥이었습니다.', 
          img: ''
        },
        {
          id: 3, region: '중동', title: '벨푸어 선언 (1917)', 
          content: '영국 외무장관 아서 밸푸어가 유대인 국가 건설 지지를 표명한 사건입니다. 이 기록은 패전국 독일에 부과된 가혹한 배상금과 더불어, 훗날 중동의 복잡한 분쟁의 불씨가 되었습니다.', 
          img: ''
        }
      ];
      localStorage.setItem('annals_pink_v2', JSON.stringify(archives));
    }

    function render(filter = '전체') {
      const list = document.getElementById('archiveList');
      list.innerHTML = '';
      const filtered = filter === '전체' ? archives : archives.filter(a => a.region === filter);
      filtered.forEach(a => {
        list.innerHTML += `
          <div class="archive-card">
            <div class="card-top-header">
                <p class="card-meta">${a.region} · CHRONICLE</p>
                <div class="top-actions">
                    <button class="btn-top" onclick="openModal(${a.id})">EDIT</button>
                    <button class="btn-top del" onclick="deleteArchive(${a.id})">ERASE</button>
                </div>
            </div>
            <h2 class="card-title">${a.title}</h2>
            <div class="content-text">${a.content}</div>
            ${a.img ? `<div class="photo-frame"><img src="${a.img}" onerror="this.style.display='none'"></div>` : ''}
          </div>`;
      });
    }

    function openModal(id = null) {
      editId = id;
      if(id) {
        const a = archives.find(i => i.id === id);
        document.getElementById('f-region').value = a.region;
        document.getElementById('f-title').value = a.title;
        document.getElementById('f-content').value = a.content;
        document.getElementById('f-img').value = a.img || '';
      } else {
        document.getElementById('f-title').value = ''; document.getElementById('f-content').value = ''; document.getElementById('f-img').value = '';
      }
      document.getElementById('modalBg').classList.add('open');
    }

    function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

    function handleSave() {
      const data = { id: editId || Date.now(), region: document.getElementById('f-region').value, title: document.getElementById('f-title').value, content: document.getElementById('f-content').value, img: document.getElementById('f-img').value };
      if(!data.title || !data.content) return alert("내용을 입력해 주세요.");
      if(editId) { const idx = archives.findIndex(a => a.id === editId); archives[idx] = data; }
      else { archives.unshift(data); }
      localStorage.setItem('annals_pink_v2', JSON.stringify(archives));
      render(); closeModal();
    }

    function deleteArchive(id) { if(confirm("삭제하시겠습니까?")) { archives = archives.filter(a => a.id !== id); localStorage.setItem('annals_pink_v2', JSON.stringify(archives)); render(); } }

    function filterBy(region, btn) {
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); render(region);
    }
    render();
  </script>
</body>
</html>
