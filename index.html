<h1>George VI</h1>
<div class="subtitle">조지 6세 · 영국 국왕 (1895–1952)</div>

<p>
왕이 될 운명이 아니었던 남자, 그러나 역사가 그를 선택했다.
조지 6세는 형 에드워드 8세의 퇴위 이후 예상치 못하게 왕위에 올랐다.
</p>

<p>
심각한 말더듬이를 극복하며 그는 국민 앞에 서야 했고,
제2차 세계대전 동안 런던을 떠나지 않고 국민과 함께 남았다.
그의 용기와 인간적인 모습은 영국 왕실의 신뢰를 회복시키는 데 중요한 역할을 했다.
</p>

<p>
그의 이야기는 영화 <킹스 스피치>의 실제 배경이 되었다.
</p>
