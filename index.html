<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANNALS — 역사 아카이브</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Nanum+Myeongjo:wght@400;700&family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #12100e;
      --parchment: #f2ead8;
      --aged: #e8dcc4;
      --gold: #b8922a;
      --rust: #8b3a2a;
      --warm-white: #faf6ee;
      --overlay: rgba(18,16,14,0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--warm-white); color: var(--ink); font-family: 'Nanum Myeongjo', serif; line-height: 1.6; word-break: keep-all; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; background: rgba(250,246,238,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(184,146,42,0.2); }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 900; letter-spacing: 5px; color: var(--ink); text-decoration: none; cursor: pointer; }
    .nav-logo span { color: var(--gold); }
    .btn-write { background: var(--rust); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; }

    /* HEADER */
    .header-section { padding: 140px 20px 60px; text-align: center; background: var(--parchment); }
    .header-section h1 { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 10px; }

    /* LIST & CARDS */
    .article-container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    .archive-card { background: white; border: 1px solid var(--aged); padding: 30px; margin-bottom: 30px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
    .archive-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--gold); }
    .meta { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); letter-spacing: 2px; }
    .card-title { font-size: 24px; margin: 10px 0; font-weight: 700; }
    .content-preview { color: #444; margin: 15px 0; text-align: justify; white-space: pre-wrap; }
    
    /* PHOTO FRAME */
    .photo-frame { max-width: 400px; margin: 20px 0; padding: 10px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid var(--aged); }
    .photo-frame img { width: 100%; filter: sepia(0.1); }
    .photo-frame img[src=""], .photo-frame img:not([src]) { display: none; }

    .card-actions { display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid var(--aged); padding-top: 15px; margin-top: 15px; }
    .btn-action { background: none; border: 1px solid var(--aged); padding: 5px 15px; font-size: 12px; cursor: pointer; color: var(--muted); }
    .btn-action:hover { color: var(--gold); border-color: var(--gold); }

    /* MODAL: 입력 칸 확대 */
    .modal-bg { display: none; position: fixed; inset: 0; background: var(--overlay); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--parchment); width: 100%; max-width: 700px; padding: 35px; border-radius: 8px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
    .modal h2 { font-family: 'Cinzel', serif; margin-bottom: 25px; color: var(--ink); text-align: center; letter-spacing: 3px; }
    
    label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--rust); text-transform: uppercase; }
    input, select, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid var(--aged); background: white; font-family: 'Nanum Myeongjo', serif; font-size: 15px; }
    
    /* 역사 기록을 위해 textarea 높이를 대폭 키움 */
    textarea { min-height: 400px; line-height: 1.8; resize: vertical; }

    .modal-btns { display: flex; gap: 15px; }
    .modal-btns button { flex: 1; padding: 15px; border: none; cursor: pointer; font-family: 'Cinzel', serif; letter-spacing: 2px; }
    .save-btn { background: var(--rust); color: white; }
    .cancel-btn { background: var(--muted); color: white; }

    footer { background: var(--ink); color: var(--parchment); padding: 60px 20px; text-align: center; margin-top: 80px; }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">ANN<span>A</span>LS</a>
    <button class="btn-write" onclick="openModal()">＋ ADD ARCHIVE</button>
  </nav>

  <header class="header-section">
    <p class="meta">Historical Archive</p>
    <h1>ANNALS</h1>
    <p style="font-family:'IM Fell English', serif; font-style:italic; color:var(--muted);">기록되지 않은 역사는 사라진다.</p>
  </header>

  <main class="article-container" id="archiveList"></main>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h2 id="modalTitle">NEW RECORD</h2>
      
      <label>주제 분류 (Category)</label>
      <input type="text" id="f-category" placeholder="예: European History">
      
      <label>인물 또는 사건명 (Title)</label>
      <input type="text" id="f-title" placeholder="기록의 제목을 입력하세요">
      
      <label>역사적 기록 (Annals)</label>
      <textarea id="f-content" placeholder="역사적 사실과 흐름을 깊이 있게 기록하세요."></textarea>
      
      <label>관련 이미지 주소 (Image URL)</label>
      <input type="text" id="f-img" placeholder="JPG, PNG 등 이미지 주소를 넣어주세요">
      
      <div class="modal-btns">
        <button class="save-btn" onclick="handleSave()">ARCHIVE</button>
        <button class="cancel-btn" onclick="closeModal()">CANCEL</button>
      </div>
    </div>
  </div>

  <footer>
    <div style="font-family:'Cinzel', serif; font-size:24px; font-weight:900; letter-spacing:8px;">ANN<span>A</span>LS</div>
    <p style="font-size:12px; margin-top:15px; color:rgba(242,234,216,0.3);">© 2026 ANNALS. All rights reserved.</p>
  </footer>

  <script>
    let archives = JSON.parse(localStorage.getItem('annals_data') || '[]');
    let editId = null;

    // 초기 데이터 예시
    if(archives.length === 0) {
      archives = [{
        id: 1, 
        category: 'European History', 
        title: '조지 6세', 
        content: '왕이 될 운명이 아니었던 남자. 본래 내성적이었으나 형 에드워드 8세의 퇴위로 갑작스럽게 왕위에 올랐습니다. 심한 말더듬이를 극복하고 제2차 세계대전 중 런던 폭격 속에서도 버킹엄 궁을 지키며 영국 국민들의 정신적 지주가 되었습니다.',
        img: ''
      }];
      localStorage.setItem('annals_data', JSON.stringify(archives));
    }

    function render() {
      const list = document.getElementById('archiveList');
      list.innerHTML = '';
      archives.forEach(a => {
        list.innerHTML += `
          <div class="archive-card">
            <p class="meta">${a.category}</p>
            <h2 class="card-title">${a.title}</h2>
            <div class="content-preview">${a.content}</div>
            ${a.img ? `<div class="photo-frame"><img src="${a.img}" onerror="this.style.display='none'"></div>` : ''}
            <div class="card-actions">
              <button class="btn-action" onclick="openModal(${a.id})">EDIT</button>
              <button class="btn-action" style="color:var(--rust)" onclick="deleteArchive(${a.id})">DELETE</button>
            </div>
          </div>
        `;
      });
    }

    function openModal(id = null) {
      editId = id;
      if(id) {
        const a = archives.find(item => item.id === id);
        document.getElementById('f-category').value = a.category;
        document.getElementById('f-title').value = a.title;
        document.getElementById('f-content').value = a.content;
        document.getElementById('f-img').value = a.img || '';
        document.getElementById('modalTitle').innerText = "EDIT RECORD";
      } else {
        document.getElementById('f-category').value = '';
        document.getElementById('f-title').value = '';
        document.getElementById('f-content').value = '';
        document.getElementById('f-img').value = '';
        document.getElementById('modalTitle').innerText = "NEW RECORD";
      }
      document.getElementById('modalBg').classList.add('open');
    }

    function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

    function handleSave() {
      const category = document.getElementById('f-category').value;
      const title = document.getElementById('f-title').value;
      const content = document.getElementById('f-content').value;
      const img = document.getElementById('f-img').value;

      if(!title || !content) return alert("제목과 기록 내용은 필수입니다.");

      const data = { id: editId || Date.now(), category, title, content, img };

      if(editId) {
        const idx = archives.findIndex(a => a.id === editId);
        archives[idx] = data;
      } else {
        archives.unshift(data);
      }
      
      localStorage.setItem('annals_data', JSON.stringify(archives));
      render();
      closeModal();
    }

    function deleteArchive(id) {
      if(!confirm("이 기록을 영구히 삭제하시겠습니까?")) return;
      archives = archives.filter(a => a.id !== id);
      localStorage.setItem('annals_data', JSON.stringify(archives));
      render();
    }

    render();
  </script>
</body>
</html>
